<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Programming Language Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Login Screen -->
  <div id="loginScreen" class="screen active">
    <div class="login-container">
      <h1>Programming Language Tracker</h1>
      <p class="subtitle">Track your progress across multiple languages</p>
      <form id="loginForm">
        <input type="text" id="nameInput" placeholder="Enter your name" required>
        <input type="password" id="passcodeInput" placeholder="Enter your passcode" required>
        <button type="submit">Login / Register</button>
      </form>
    </div>
  </div>

  <!-- Language Selection Screen -->
  <div id="languageScreen" class="screen">
    <div class="header">
      <h1>Select a Language</h1>
      <div class="user-info">
        <span id="userName"></span>
        <button id="logoutBtn" class="btn-secondary">Logout</button>
      </div>
    </div>
    <div class="language-grid" id="languageGrid"></div>
    <button id="viewLeaderboardBtn" class="btn-primary">View Leaderboard</button>
  </div>

  <!-- Map/Levels Screen -->
  <div id="mapScreen" class="screen">
    <div class="header">
      <button id="backToLanguagesBtn" class="btn-secondary">← Back</button>
      <h1 id="currentLanguage"></h1>
      <button id="viewLeaderboardBtn2" class="btn-secondary">Leaderboard</button>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
      <span class="progress-text" id="progressText">0%</span>
    </div>
    <div class="map-container" id="mapContainer"></div>
  </div>

  <!-- Leaderboard Screen -->
  <div id="leaderboardScreen" class="screen">
    <div class="header">
      <button id="backFromLeaderboardBtn" class="btn-secondary">← Back</button>
      <h1>Leaderboard</h1>
    </div>
    <div class="leaderboard-container">
      <table class="leaderboard-table">
        <thead>
          <tr>
            <th>Rank</th>
            <th>Name</th>
            <th>Language</th>
            <th>Progress</th>
            <th>Completion</th>
          </tr>
        </thead>
        <tbody id="leaderboardBody"></tbody>
      </table>
    </div>
  </div>

  <!-- Question Modal -->
  <div id="questionModal" class="modal">
    <div class="modal-content">
      <h2>Level Challenge</h2>
      <p id="questionText"></p>
      <input type="text" id="answerInput" placeholder="Your answer">
      <div class="modal-buttons">
        <button id="submitAnswerBtn" class="btn-primary">Submit</button>
        <button id="cancelQuestionBtn" class="btn-secondary">Cancel</button>
      </div>
      <p id="feedbackText" class="feedback"></p>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
